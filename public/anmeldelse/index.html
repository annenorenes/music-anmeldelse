<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldelser</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="stilark.css">
</head>
<body>
    <h2>Skriv din anmeldelse</h2>
        <form id="skjema">
            <label>Dato:</label>
            <input type="date" id="dato" required>

            <label>Kommentar:</label>
            <textarea id="kommentar" required></textarea>

            <label>Terningkast (1-6):</label>
            <input type="number" id="rating" min="1" max="6" required>

            <button type="submit">Send anmeldelse</button>
        </form>
</body>
</html>
