<!DOCTYPE html>
<html lang="no"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skriv anmeldelse | MusikkBase</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="stilark.css">
</head>
<body>

    <header>
        <h1>MusikkBase</h1>
        <nav>
            <ul>
                <li><a href="/oversikt_album/index.html">Relevante album for deg</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="skrive-seksjon">
            <h2>Skriv din anmeldelse</h2>
            
            <form id="skjema">
                <div class="form-group">
                    <label for="dato">Dato for anmeldelse:</label>
                    <input type="date" id="dato" required>
                </div>

                <div class="form-group">
                    <label for="kommentar">Din kommentar:</label>
                    <textarea id="kommentar" placeholder="Hva synes du om albumet?" required></textarea>
                </div>

                <div class="form-group">
                    <label for="rating">Terningkast (1-6):</label>
                    <input type="number" id="rating" min="1" max="6" value="4" required>
                </div>

                <button type="submit">Send anmeldelse</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MusikkBase - IT1 Prosjekt</p>
    </footer>

</body>
</html>
